# DHCPv6 server for the TinyOS BLIP/PPP WSN.
#
# Start this through ./start-wsn-dhcpv6.sh after node 1 runs PppRouter.
# The script creates ppp0, assigns fd00:23:42:1::100/64 to the host side,
# then launches dnsmasq on ppp0.

port=0
interface=ppp0
bind-dynamic
except-interface=lo

dhcp-authoritative
log-dhcp
log-queries

# Stateful DHCPv6 pool for PppRouter and sensor nodes relayed through RPL.
dhcp-range=fd00:23:42:1::1000,fd00:23:42:1::1fff,64,12h

# Optional DNS value; harmless for the TinyOS nodes, useful for ordinary clients.
dhcp-option=option6:dns-server,fd00:23:42:1::100
